include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Suppresses false-positive warnings from the outdated analyzer (3.4.0)
    # misidentifying @JsonKey on Freezed factory constructor parameters.
    # The Freezed code generator handles these correctly; the generated
    # .g.dart files confirm the annotations work as expected.
    invalid_annotation_target: ignore

linter:
  rules:
    - always_declare_return_types
    - avoid_print
    - prefer_const_constructors
    - prefer_const_literals_to_create_immutables
    - prefer_final_fields
    - sort_child_properties_last
    - use_key_in_widget_constructors
